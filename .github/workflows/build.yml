name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:
      - uses: actions/checkout@v4

      - name: clone riscv toolchain
        run: |
          git clone --recursive https://github.com/riscv/riscv-gnu-toolchain
          cd riscv-gnu-toolchain

      - name: install dependencies
        run: sudo apt-get update && sudo apt-get install autoconf automake autotools-dev curl python3 libmpc-dev libmpfr-dev libgmp-dev gawk build-essential bison flex texinfo gperf libtool patchutils bc zlib1g-dev libexpat-dev

      - name: build toolchain
        run: |
          cd riscv-gnu-toolchain
          ./configure --prefix=/opt/riscv --with-arch=rv64i --with-abi=lp64
          make -j $(nproc)

      - name: tarball build
        run: tar czvf riscv.tar.gz -C /opt/ riscv/

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: riscv64-elf-ubuntu-latest
          path: riscv.tar.gz

      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          files: riscv.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

